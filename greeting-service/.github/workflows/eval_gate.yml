name: Eval Gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run spec compliance evals
        run: python3 -m evals.runners.rubric_eval --gate 4.5
