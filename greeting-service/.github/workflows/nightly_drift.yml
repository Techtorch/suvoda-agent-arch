name: Nightly Drift

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check invariant drift
        run: python3 -m harness.sensors.drift_detectors.invariant_check
